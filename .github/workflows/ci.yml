name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore --warnaserror

      - name: Test
        run: dotnet test OpenAkeneo.RestApiClient.UnitTests --configuration Release --no-build --verbosity normal

      - name: LLM docs are current (DocGen regeneration must be a no-op)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet run --project tools/DocGen --configuration Release --no-build
          git diff --exit-code -- llms.txt docs/api
